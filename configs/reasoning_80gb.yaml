vast_api_url: https://console.vast.ai/api/v0

gpu:
  # Set to 79 to target 80GB class cards (A100/H100 80GB) instead of 40GB variants.
  min_vram_gb: 79
  preferred_models:
    - A100_SXM4
    - A100_PCIE
    - H100_SXM
    - H100_PCIE

min_inet_down_mbps: 500
min_inet_up_mbps: 100
min_reliability: 0.99
verified_only: true

max_dph: 2.5
allow_interruptible: false
limit: 1

idle_timeout_seconds: 1800
instance_ready_timeout_seconds: 1800
snapshot_version: v1-80gb

# Disk headroom for model + runtime assets.
whisper_vram_gb: 0
whisper_disk_gb: 10
min_disk_gb: 250
