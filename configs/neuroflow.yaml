vast_api_url: https://console.vast.ai/api/v0
bootstrap_base_url: https://raw.githubusercontent.com/alexmasita/ai-orchestrator/main
image: alexmasita/ai-neuroflow-snapshots:instance_32873649_at_March_14th_2026_at_09-44-20_PM_UTC

gpu:
  # Cheap dev target: 80GB class cards.
  # This is the lowest practical VRAM tier for a single NeuroFlow dev box
  # if you want interpret + rerank + STT and optional dormant TTS readiness.
  min_vram_gb: 79
  preferred_models:
    - A800_PCIE
    - A100_SXM
    - A100_PCIE
    - H100_PCIE
    - RTX_6000_Pro

# Relaxed networking for dev/interruptible marketplace usage.
min_inet_down_mbps: 900
min_inet_up_mbps: 500
min_reliability: 0.90
verified_only: true

# Dev-cost-first posture.
max_dph: 1.00
allow_interruptible: false
limit: 1

idle_timeout_seconds: 1200
instance_ready_timeout_seconds: 2400
restart_transition_timeout_seconds: 300
snapshot_version: v2-neuroflow-dev-80gb
runtime_file_paths:
  - "/Users/macbook/Library/Mobile Documents/com~apple~CloudDocs/NeuroFlow_Experiments/moldavite/neuroflow-mvp/.runtime/neuroflow/neuroflow-runtime.json"

# Disk headroom:
# Cold bootstrap pulls multiple large model repos plus temp/cache/runtime artifacts.
# Keep this comfortably above the nominal model payload to avoid mid-download failures.
whisper_vram_gb: 4
whisper_disk_gb: 5
min_disk_gb: 120
