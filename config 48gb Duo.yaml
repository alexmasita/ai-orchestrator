# Config for Script #2: RTX 6000 Ada 48GB Setup
vast_api_key: "bfc42d92b18f1ac049575940992fa70bf492767b5822f4d9556239a63a913751"
vast_api_url: "https://console.vast.ai/api/v0"

gpu:
  # Set to 45 to target the 48GB cards specifically.
  min_vram_gb: 45
  preferred_models:
    - RTX_6000_Ada
    - RTX_A6000
    - RTX_A5000 # Only if 20B+30B fit tightly

min_inet_down_mbps: 200
min_inet_up_mbps: 100

min_reliability: 0.98
verified_only: true

# Lower budget for consumer/prosumer cards
max_dph: 1.1
allow_interruptible: false
limit: 1

idle_timeout_seconds: 1800
instance_ready_timeout_seconds: 1200
snapshot_version: "v1-48gb"

whisper_vram_gb: 0
whisper_disk_gb: 10
# Total disk can be lower (150GB) for the 20B + 30B models
min_disk_gb: 150